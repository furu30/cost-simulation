<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>製品原価シミュレーション</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ヘッダー -->
  <header class="app-header">
    <h1>製品原価シミュレーション</h1>
    <div class="header-actions">
      <button id="btn-reset-data" class="btn btn-outline" title="データを初期化" style="color:#d32f2f;border-color:#d32f2f">リセット</button>
      <button id="btn-demo-data" class="btn btn-outline" title="デモデータ投入">デモデータ</button>
      <button id="btn-export-excel" class="btn btn-outline" title="Excel出力" style="background:#217346;color:#fff;border-color:#217346">📊 Excel</button>
      <button id="btn-export-pdf" class="btn btn-outline" title="PDF出力" style="background:#d32f2f;color:#fff;border-color:#d32f2f">📄 PDF</button>
      <button id="btn-export" class="btn btn-outline" title="JSON書き出し">書き出し</button>
      <button id="btn-import" class="btn btn-outline" title="JSON読み込み">読み込み</button>
      <input type="file" id="file-import" accept=".json" style="display:none">
    </div>
  </header>

  <!-- タブバー -->
  <nav class="tab-bar">
    <button class="tab-item active" data-tab="tab-base">全社設定</button>
    <button class="tab-item" data-tab="tab-dept">部門（工程）</button>
    <button class="tab-item" data-tab="tab-product">製品原価</button>
  </nav>

  <!-- ======== 画面1: 全社設定 (company_settings) ======== -->
  <div id="tab-base" class="tab-panel active">

    <!-- システム設定 -->
    <section class="card settings-card">
      <h2>システム設定</h2>
      <div class="settings-grid">
        <div class="setting-group">
          <label class="setting-label">原価計算方式</label>
          <div class="level-selector" id="level-selector">
            <button class="level-btn active" data-level="1">
              <span class="level-badge">方式1</span>
              <span class="level-name">簡易方式（全社統一レート）</span>
              <span class="level-desc">全工程同一・直接間接統一</span>
            </button>
            <button class="level-btn" data-level="2">
              <span class="level-badge">方式2</span>
              <span class="level-name">全社統一計算（全工程同一レート）</span>
              <span class="level-desc">直接原価レート＋間接費配賦レート</span>
            </button>
            <button class="level-btn" data-level="3">
              <span class="level-badge">方式3</span>
              <span class="level-name">部門別アワーレート（人手主体）</span>
              <span class="level-desc">直接原価レート＋間接費配賦レート</span>
            </button>
            <button class="level-btn" data-level="4">
              <span class="level-badge">方式4</span>
              <span class="level-name">部門別アワーレート（人手＋機械混在）</span>
              <span class="level-desc">直接原価レート＋間接費配賦レート</span>
            </button>
          </div>
        </div>
        <div class="setting-group">
          <label class="setting-label">運送費配賦</label>
          <div class="toggle-row">
            <label class="toggle-switch">
              <input type="checkbox" id="freight-toggle">
              <span class="toggle-slider"></span>
            </label>
            <span id="freight-status" class="text-muted">OFF</span>
          </div>
          <div id="freight-rate-field" class="freight-rate-field" style="display:none">
            <label>単位運送費レート（円/kg）</label>
            <input type="number" id="freight-rate" class="input-num" step="0.01" value="0" style="width:120px">
          </div>
        </div>
      </div>
    </section>

    <!-- 全社基礎データ -->
    <section class="card">
      <h2>全社基礎データ</h2>
      <div class="form-grid four-col">
        <label>対象年度・名称</label>
        <input type="text" id="cs-setting-name" value="" placeholder="例: 2024年度 標準設定" style="grid-column: span 3">

        <label>共通年間労働時間(h)</label>
        <input type="number" id="cs-common-working-hours" class="input-num" step="1" value="0">

        <label>間接費配賦基準</label>
        <select id="cs-alloc-type">
          <option value="worker_count">人数比</option>
          <option value="area">面積比</option>
          <option value="manual">手動（%指定）</option>
        </select>
      </div>
      <div class="summary-row" id="cs-summary"></div>
      <div class="summary-row" id="indirect-summary" style="margin-top:4px;background:var(--warning-light)"></div>
    </section>

    <div class="panel-grid two-col">
      <!-- 損益計算書 -->
      <section class="card">
        <h2>損益計算書（P&L）参考</h2>
        <div class="form-grid">
          <label>売上高（千円）</label>
          <input type="number" id="pl-sales" class="input-num" step="1">
          <label>販管費（千円）</label>
          <input type="number" id="pl-sga-total" class="input-num" step="1">
        </div>
        <div id="pl-shipping-row" class="form-grid" style="display:none">
          <label>うち運送費（千円）</label>
          <input type="number" id="pl-sga-shipping" class="input-num" step="1">
        </div>
        <div class="summary-row" id="pl-summary"></div>
      </section>

      <!-- 製造原価報告書 -->
      <section class="card">
        <h2>製造原価報告書 参考</h2>
        <h3>材料費</h3>
        <div class="form-grid">
          <label>材料費（千円）</label>
          <input type="number" id="mcr-material" class="input-num" step="1">
        </div>
        <h3>労務費</h3>
        <div class="form-grid">
          <label>賃金（千円）</label>
          <input type="number" id="mcr-wages" class="input-num" step="1">
          <label>賞与（千円）</label>
          <input type="number" id="mcr-bonus" class="input-num" step="1">
          <label>福利厚生費（千円）</label>
          <input type="number" id="mcr-welfare" class="input-num" step="1">
        </div>
        <h3>外注加工費</h3>
        <div class="form-grid">
          <label>外注加工費（千円）</label>
          <input type="number" id="mcr-outsourcing" class="input-num" step="1">
        </div>
        <h3>経費 <span class="text-muted" style="font-size:11px;font-weight:400">※減価償却費は部門の機械装置費用に含まれない分を入力</span></h3>
        <div class="form-grid">
          <label>減価償却費（千円）</label>
          <input type="number" id="mcr-depreciation" class="input-num" step="1">
          <label>消耗品費（千円）</label>
          <input type="number" id="mcr-consumables" class="input-num" step="1">
          <label>修繕費（千円）</label>
          <input type="number" id="mcr-repairs" class="input-num" step="1">
          <label>リース料（千円）</label>
          <input type="number" id="mcr-lease" class="input-num" step="1">
          <label>電力費（千円）</label>
          <input type="number" id="mcr-utilities" class="input-num" step="1">
          <label>租税公課（千円）</label>
          <input type="number" id="mcr-taxes" class="input-num" step="1">
          <label>地代家賃（千円）</label>
          <input type="number" id="mcr-rent" class="input-num" step="1">
          <label>その他（千円）</label>
          <input type="number" id="mcr-other" class="input-num" step="1">
        </div>
        <div class="summary-row" id="mcr-summary"></div>
      </section>
    </div>

    <div class="panel-actions">
      <button id="btn-save-base" class="btn btn-primary">保存</button>
    </div>
  </div>

  <!-- ======== 画面2: 部門（工程）マスタ (departments) ======== -->
  <div id="tab-dept" class="tab-panel">
    <div class="toolbar">
      <button id="btn-add-dept" class="btn btn-primary">+ 部門追加</button>
    </div>
    <div id="dept-container"></div>

    <!-- 部門別レート一覧 -->
    <section class="card" id="dept-rate-summary" style="display:none">
      <h2>部門別アワーレート一覧</h2>
      <table class="data-table" id="dept-rate-table">
        <thead id="dept-rate-thead"></thead>
        <tbody id="dept-rate-tbody"></tbody>
      </table>
    </section>
  </div>

  <!-- ======== 画面3: 製品原価 (products + product_routings) ======== -->
  <div id="tab-product" class="tab-panel">
    <div class="toolbar">
      <button id="btn-add-product" class="btn btn-primary">+ 製品追加</button>
    </div>
    <div id="product-container"></div>

    <!-- 製品原価比較ダッシュボード -->
    <section class="card" id="product-compare" style="display:none">
      <h2>製品原価比較ダッシュボード</h2>
      <div id="product-compare-content"></div>
    </section>
  </div>

  <!-- 部門編集モーダル -->
  <div id="dept-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2 id="dept-modal-title">部門を編集</h2>
      <form id="form-dept">
        <input type="hidden" id="dept-edit-idx">
        <div class="form-grid">
          <label>工程名 *</label>
          <input type="text" id="dept-name" required placeholder="例: A工程（NC旋盤）">

          <label>直接作業者数 *</label>
          <input type="number" id="dept-worker-count" class="input-num" min="0" step="1" value="0">

          <label>作業者年間人件費(円) *</label>
          <input type="number" id="dept-annual-labor-cost" class="input-num" step="1" value="0">

          <label>標準機械装置費用(年/円)</label>
          <input type="number" id="dept-machine-cost" class="input-num" step="1" value="0">
        </div>

        <div id="alloc-value-section" style="display:none">
          <h3>配賦基準値</h3>
          <div class="form-grid">
            <label id="alloc-value-label">配賦基準値</label>
            <input type="number" id="dept-alloc-value" class="input-num" step="0.01" value="0" placeholder="面積(㎡)or 手動比率(%)">
          </div>
        </div>

        <!-- 方式4: 機械主体設定 -->
        <div id="machine-section">
          <h3>機械主体設定（方式4のみ）</h3>
          <div class="form-grid">
            <label>稼働形態</label>
            <select id="dept-is-machine-based">
              <option value="false">人手主体</option>
              <option value="true">機械主体（多台持ち等）</option>
            </select>
          </div>
          <div id="machine-detail-fields" style="display:none">
            <div class="form-grid">
              <label>設備台数</label>
              <input type="number" id="dept-machine-count" class="input-num" min="0" step="1" value="0">
              <label>1台あたり稼働時間(h/年)</label>
              <input type="number" id="dept-machine-hours" class="input-num" min="0" step="1" value="0">
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">保存</button>
          <button type="button" id="btn-cancel-dept" class="btn btn-outline">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast-container"></div>

  <!-- CDN: Excel & PDF出力 -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="app.js"></script>
  <script src="calc-engine.js"></script>
  <script src="base-data.js"></script>
  <script src="dept-cost.js"></script>
  <script src="product-cost.js"></script>
  <script src="export.js"></script>
</body>
</html>
